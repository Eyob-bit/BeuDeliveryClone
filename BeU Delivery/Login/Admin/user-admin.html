<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Eats Manager - Store Under Review</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        /* General Layout */
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}


        body {
            
            background-color: #f7f7f7; /* Light background for the dashboard area */
            font-family: Arial, sans-serif;
        }
        
        .dashboard-wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* -----------------------
           Header / Top Bar 
           ----------------------- */
        .top-bar {
            background-color: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 10px 30px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
        }
        
        .top-bar-link {
            color: #333;
            text-decoration: none;
            font-size: 0.85rem;
            margin-left: 20px;
        }

        /* --- SIDEBAR --- */
.sidebar {
    width: 240px;
    background: #fff;
    border-right: 1px solid #ddd;
    padding: 20px 0;
     
}

.sidebar a {
    text-decoration: none;
    color: black;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 20px;
    font-size: 22px;
    font-weight: bold;
}

.sidebar ul {
    list-style: none;
}

.sidebar li {
    padding: 12px 20px;
    cursor: pointer;
}

.sidebar li:hover,
.sidebar .active {
    background: #f0f0f0;
}

.sidebar .submenu {
    margin-left: 20px;
    display: none;
}

.sidebar .submenu li {
    font-size: 14px;
}
        /* -----------------------
           Main Content Area 
           ----------------------- */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }
        
        
        
    </style>
</head>
<body>
    <div class="top-bar d-none d-sm-flex">
        <span class="text-dark small fw-bold me-4">Ethio Chef - 1401 S Main St, Kannapolis, US</span>
        <a href="#" class="top-bar-link">Help</a>
        <a href="#" class="top-bar-link">Log Out</a>
    </div>
    
    <div class="dashboard-wrapper">
        <aside class="sidebar">
        <h2>Admin</h2>
        <ul>
            <a href="admin-dashboard.html"><li>Dashboard</li></a>
            <a href="admin-users.html"><li class="active">Users</li></a>
            <a href="admin-restaurants.html"><li>Restaurants</li></a>

            <li onclick="toggleMenu()">Food Added ▼</li>
            <ul id="submenu" class="submenu" style="display:block;">
                <a href="admin-food-pending.html"><li>Pending</li></a>
                <a href="admin-food-spam.html"><li>Spam</li></a>
                <a href="admin-food-approved.html"><li>Approved</li></a>
            </ul>

            <a href="admin-payments.html"><li>Payments</li></a>
            <a href="admin-delivery-registration.html"><li>Delivery Registration</li></a>
            <a href="admin-settings.html"><li>Settings</li></a>
        </ul>
    </aside>
        
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        function toggleMenu() {
            const submenu = document.getElementById("submenu");
            submenu.style.display = submenu.style.display === "block" ? "none" : "block";
        }
    </script>
</body>
</html>
