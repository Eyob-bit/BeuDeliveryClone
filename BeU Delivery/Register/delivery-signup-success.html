<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delivery Request Submitted</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fafafa;
            margin: 0;
            padding: 0;
        }

        header {
            background: #ffffff;
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        header a {
            text-decoration: none;
            margin-left: 20px;
            color: #333;
            font-weight: 600;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
        }

        .message-box {
            width: 90%;
            max-width: 700px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            color: black;
            font-size: 26px;
        }

        p {
            margin-top: 15px;
            color: #444;
            font-size: 18px;
        }

        a.button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 20px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        a.button:hover {
            background: #38281e;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">
        <a href="../index.html" id="logo">beU Delivery</a>
    </div>

</header>

<div class="message-box">
    <h2>Your Request Has Been Submitted</h2>
    <p>Please wait while your application is reviewed and approved.</p>

    <a class="button" href="../index.html">Back to Home</a>
</div>

</body>
</html>
